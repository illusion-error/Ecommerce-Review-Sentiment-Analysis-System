services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sentiment-backend
    environment:
      DATABASE_BACKEND: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sentiment_analysis}
      MYSQL_USER: ${MYSQL_USER:-sentiment_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sentiment_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    ports:
      - "${SERVER_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sentiment-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: sentiment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sentiment_analysis}
      MYSQL_USER: ${MYSQL_USER:-sentiment_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sentiment_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deployment/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-sentiment_user} -p${MYSQL_PASSWORD:-sentiment_password} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: sentiment-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
